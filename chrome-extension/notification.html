<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      cursor: pointer;
      user-select: none;
      overflow: hidden;
    }
    .container {
      text-align: center;
      padding: 16px 24px;
    }
    .title {
      font-size: 15px;
      font-weight: 700;
      color: #818cf8;
      margin-bottom: 6px;
    }
    .message {
      font-size: 13px;
      color: #94a3b8;
      line-height: 1.4;
    }
    .hint {
      font-size: 11px;
      color: #22c55e;
      margin-top: 10px;
      transition: color 1s linear;
    }
    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
    }
    .progress-fill {
      height: 100%;
      width: 100%;
      background: #22c55e;
      transition: width 1s linear, background-color 1s linear;
    }
  </style>
</head>
<body>
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  <div class="container">
    <div class="title">TrackBillables</div>
    <div class="message">Time to track your billable hours!</div>
    <div class="hint">Click to open app &middot; closing in <span id="countdown">8</span>s</div>
  </div>
  <script src="notification.js"></script>
</body>
</html>
